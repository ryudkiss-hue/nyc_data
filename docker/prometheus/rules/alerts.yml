groups:
  - name: nycdot_alerts
    interval: 30s
    rules:
      # Application Availability
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL on {{ $labels.instance }} has been down for more than 1 minute"
          action: "Check docker-compose logs postgres"

      - alert: APIServerDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API server is down"
          description: "API server on {{ $labels.instance }} is not responding"
          action: "Run: docker-compose restart api"

      - alert: StreamlitDown
        expr: up{job="app"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Streamlit app is down"
          description: "Streamlit dashboard is not responding"
          action: "Run: docker-compose restart app"

      # Performance Issues
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API response time > 2 seconds"
          description: "95th percentile response time is {{ $value | humanizeDuration }}"
          action: "Check database query performance with: SELECT * FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API error rate > 1%"
          description: "Error rate is {{ $value | humanizePercentage }}"
          action: "Check logs: docker-compose logs api"

      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P99 latency > 5 seconds"
          description: "P99 latency is {{ $value | humanizeDuration }}"
          action: "Investigate slow queries or resource bottlenecks"

      # Resource Usage
      - alert: DiskSpaceRunningOut
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space < 10%"
          description: "Disk space on {{ $labels.instance }} is {{ $value | humanizePercentage }}"
          action: "Clean up old backups or expand disk"

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 85%"
          description: "Memory usage on {{ $labels.instance }} is {{ $value | humanizePercentage }}"
          action: "Check which processes are consuming memory: docker stats"

      - alert: HighCPUUsage
        expr: |
          (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 90%"
          description: "CPU usage on {{ $labels.instance }} is {{ $value }}%"
          action: "Check resource consumption: docker stats"

      # Database Health
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_activity_count{state="active"} > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High active database connections"
          description: "{{ $value }} active connections (90 is threshold)"
          action: "Check for long-running queries: SELECT * FROM pg_stat_activity WHERE state='active'"

      - alert: SlowDatabaseQueries
        expr: |
          pg_slow_queries > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Multiple slow queries detected"
          description: "{{ $value }} queries taking > 1 second"
          action: "Review query performance: SELECT query, calls, mean_time FROM pg_stat_statements WHERE mean_time > 1000 ORDER BY mean_time DESC LIMIT 10"

      - alert: DatabaseReplicationLag
        expr: |
          pg_replication_lag_bytes > 1000000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Replication lag detected"
          description: "Replication lag is {{ $value | humanize }} bytes"
          action: "Check replica status and network connectivity"

      # Backup Monitoring
      - alert: BackupDidNotRun
        expr: |
          (time() - backup_timestamp_seconds) > 86400
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backup did not run in last 24 hours"
          description: "Last backup was {{ $value | humanizeDuration }} ago"
          action: "Check backup script logs and cron/task scheduler configuration"

      - alert: BackupFailed
        expr: |
          backup_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backup failed"
          description: "Last backup exited with error"
          action: "Check backup logs for errors"

      # API Rate Limiting
      - alert: RateLimitExceeded
        expr: |
          rate_limit_exceeded_total > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API rate limits being exceeded"
          description: "{{ $value }} requests hit rate limit"
          action: "Check if there are runaway clients or configure higher limits"

      # Data Governance
      - alert: CDCBacklogGrowing
        expr: |
          increase(cdc_events_pending[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CDC event backlog growing"
          description: "{{ $value }} CDC events pending processing"
          action: "Check if CDC processor is running: docker-compose logs app | grep CDC"

      - alert: ComplianceViolation
        expr: |
          compliance_violations_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Data compliance violation detected"
          description: "{{ $value }} compliance violations"
          action: "Immediately review compliance logs and affected records"

      - alert: UnauditedDataChanges
        expr: |
          unaudited_changes_total > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Unaudited data changes detected"
          description: "{{ $value }} changes missing audit trail"
          action: "Investigate and enable audit logging"

      # Certificate Expiration
      - alert: SSLCertificateExpiringSoon
        expr: |
          ssl_certificate_expiry_seconds < 604800
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring in less than 7 days"
          description: "Certificate expires in {{ $value | humanizeDuration }}"
          action: "Renew certificate immediately"

      - alert: SSLCertificateExpired
        expr: |
          ssl_certificate_expiry_seconds < 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SSL certificate has expired"
          description: "Certificate expired {{ $value | humanizeDuration }} ago"
          action: "Replace certificate immediately - requests may be blocked"

  - name: business_alerts
    interval: 1m
    rules:
      # Business-level alerts
      - alert: NoInspectionsToday
        expr: |
          increase(inspections_submitted_total[24h]) == 0
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "No inspections submitted today"
          description: "No inspection data received in past 2 hours"
          action: "Check if field inspectors are using the app"

      - alert: BudgetViolation
        expr: |
          (contract_spent_total / contract_budgeted_total) > 1.0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Contract budget exceeded"
          description: "Contract {{ $labels.contract_id }} has exceeded budget"
          action: "Review contract spending and approve additional budget if needed"

      - alert: SLAViolation
        expr: |
          repair_completion_time_days > target_completion_time_days
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SLA violation detected"
          description: "Repair {{ $labels.repair_id }} exceeding target completion time"
          action: "Escalate to project manager"
