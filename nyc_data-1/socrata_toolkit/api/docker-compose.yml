version: '3.8'

services:
  # PostgreSQL database (shared with Airflow)
  postgres:
    image: postgres:15-alpine
    container_name: nyc-sidewalk-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nyc_sidewalk}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/init_nyc_domain_model.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nyc-sidewalk

  # Redis cache (shared with Airflow)
  redis:
    image: redis:7-alpine
    container_name: nyc-sidewalk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nyc-sidewalk

  # FastAPI service
  api:
    build:
      context: ../..
      dockerfile: socrata_toolkit/api/Dockerfile
    container_name: nyc-sidewalk-api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-nyc_sidewalk}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-with-openssl-rand-hex-32}
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: 1440
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      CORS_ORIGINS: "http://localhost:3000 http://localhost:8000 http://0.0.0.0:8000"
      RATE_LIMIT_REQUESTS: 100
      CACHE_TTL_SUMMARY_KPIS: 7200
      CACHE_TTL_SEGMENT_DETAILS: 86400
      CACHE_TTL_CONTRACTOR_METRICS: 21600
      CACHE_TTL_INCIDENT_LISTS: 3600
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../..:/app
    networks:
      - nyc-sidewalk
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nyc-sidewalk-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - nyc-sidewalk
    profiles:
      - with-nginx

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: nyc-sidewalk-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nyc-sidewalk
    profiles:
      - with-monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nyc-sidewalk-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - nyc-sidewalk
    profiles:
      - with-monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  nyc-sidewalk:
    driver: bridge
