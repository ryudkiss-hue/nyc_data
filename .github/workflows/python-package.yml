# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core deps explicitly to avoid poetry build-backend issues
        pip install "pandas>=2.0,<3.0" "numpy>=1.24,<3.0" pyyaml requests \
            python-dateutil click "pydantic>=2.0" "openpyxl>=3.0" \
            "duckdb>=0.9.0" tenacity apscheduler
        # Editable install without re-resolving deps
        pip install --no-deps -e .
        pip install -r requirements-dev.txt
        pip install networkx scikit-learn fastapi httpx flake8
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest tests/ -q --tb=short \
          --ignore=tests/test_interactive_explore.py \
          --ignore=tests/test_studio.py \
          --ignore=tests/test_i18n.py \
          --ignore=tests/test_api_security.py \
          --ignore=tests/test_visualization.py
