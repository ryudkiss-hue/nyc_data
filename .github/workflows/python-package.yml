# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions: read-all

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Project declares requires-python >=3.11 (setup.py); 3.10 lacks datetime.UTC.
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core deps explicitly first for a fast, deterministic base.
        pip install "pandas>=2.0,<3.0" "numpy>=1.24,<3.0" pyyaml requests \
            python-dateutil click "pydantic>=2.0" "openpyxl>=3.0" \
            "duckdb>=0.9.0" tenacity apscheduler
        pip install -r requirements-dev.txt
        pip install networkx scikit-learn fastapi httpx flake8
        # Install the package with the full [mission] extra so view-layer
        # imports (streamlit, plotly, folium, geopandas, pymc, prophet,
        # numba, playwright, ...) resolve during pytest collection. This
        # mirrors nyc-toolkit-ci.yml and trades longer CI time for the
        # ability to collect/run the full app + view test suite.
        pip install -e ".[xlsx,postgres,mission]"
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=docs/archive
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=docs/archive
    - name: Test with pytest
      env:
        SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        pytest tests/ -q --tb=short
