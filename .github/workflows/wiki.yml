name: Sync Wiki to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync wiki pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the wiki repo
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki_repo

          # Copy all wiki markdown files
          cp wiki/*.md wiki_repo/

          # Commit and push
          cd wiki_repo
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes to sync."
          else
            git commit -m "docs: sync wiki from main repo [skip ci]"
            git push origin master || git push origin main
            echo "Wiki synced successfully."
          fi
