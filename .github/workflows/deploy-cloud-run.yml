name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - claude/elegant-ptolemy-kctbqo
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: northamerica-northeast2
  SERVICE_NAME: nyc-sidewalk-toolkit

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_secret == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
            -t gcr.io/$PROJECT_ID/$SERVICE_NAME:latest \
            -f Dockerfile.cloudbuild .

      - name: Push to Container Registry
        run: |
          gcloud auth configure-docker
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --timeout 600 \
            --set-env-vars "\
              SOCRATA_APP_TOKEN=${{ secrets.SOCRATA_APP_TOKEN }},\
              ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},\
              MOTHERDUCK_TOKEN=${{ secrets.MOTHERDUCK_TOKEN }}" \
            --project $PROJECT_ID

      - name: Get Cloud Run URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)' --project $PROJECT_ID)
          echo "Cloud Run URL: $URL"
          echo "Dash Dashboard: $URL/dash/"
          echo "API Docs: $URL/api/docs/"

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)' --project $PROJECT_ID)
          curl -s "$URL/api/health" | grep -q "healthy" && echo "✓ Deployment healthy" || echo "❌ Deployment check failed"
