name: Deploy Mission Control to GitHub Pages

on:
  push:
    branches: [main, claude/project-optimization-upgrade-R2Qw6]
    paths:
      - "app/static/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; skip queued runs but don't cancel in-progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          # Copy the app as index.html so the root URL works directly
          cp app/static/mission_control_v2.html _site/index.html
          # Also keep the original filename as an alias
          cp app/static/mission_control_v2.html _site/mission_control_v2.html
          # Create a minimal 404 redirect
          cat > _site/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=/">
            <title>Redirecting…</title>
          </head>
          <body>Redirecting to <a href="/">Mission Control</a>…</body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
