name: Claude Code Review on PR

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/socrata_toolkit/**/*.py'
      - 'tests/**/*.py'
      - 'app/**/*.py'

jobs:
  suggest-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment with code-review instructions
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude Code Review Available\n\nRun automated code review with:\n\n\`\`\`bash\nclaude /code-review ultra ${context.issue.number}\n\`\`\`\n\nThis will:\n- ✅ Check for correctness bugs\n- ✅ Suggest simplifications & efficiency improvements\n- ✅ Review for DuckDB best practices (your focus)\n- ✅ Post findings as inline comments\n\n**For Layers 4-9 implementation**: Review catches reliability issues early.`
            })

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: |
          ruff check src/socrata_toolkit tests app --output-format=github
        continue-on-error: true

      - name: Run ruff format check (no-fix)
        run: |
          ruff format --check src/socrata_toolkit tests app
        continue-on-error: true

  test-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements-dev.txt

      - name: Detect changed test files
        id: detect
        run: |
          git fetch origin main:main 2>/dev/null || git fetch origin
          CHANGED=$(git diff main...HEAD --name-only | grep "^tests/test_" | head -5)
          if [ -n "$CHANGED" ]; then
            echo "files=$CHANGED" >> $GITHUB_OUTPUT
          fi

      - name: Run affected tests
        if: steps.detect.outputs.files != ''
        run: |
          pytest ${{ steps.detect.outputs.files }} -v --tb=short
        continue-on-error: true
