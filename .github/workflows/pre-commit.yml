name: Pre-commit Pipeline

# Run locally: pre-commit run --all-files
on:
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    
    # Grant the GITHUB_TOKEN permission to push commits back to the branch
    permissions:
      contents: write
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v7
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit pytest pandas
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run pre-commit hooks
      id: pre-commit
      continue-on-error: true
      run: |
        pre-commit run --all-files

    - name: Auto-commit formatting fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-fix formatting and linting by pre-commit hooks"

    - name: Fail if pre-commit failed
      # This ensures the PR still shows a red 'X' if Flake8 caught syntax errors that couldn't be auto-fixed
      if: steps.pre-commit.outcome == 'failure'
      run: exit 1