name: Deploy Jupyter Book to GitHub Pages
"on":
  push:
    branches:
      - main
    paths:
      - jupyter_book/**
      - .github/workflows/jupyter-book-deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements-dev.txt
          pip install -q jupyter nbconvert

      - run: |
          mkdir -p docs/jupyter_book
          cd jupyter_book
          for notebook in dashboards/*.ipynb; do
            jupyter nbconvert --to html --output-dir="../docs/jupyter_book" "$notebook" || true
          done

      - uses: actions/upload-pages-artifact@v2
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v2
