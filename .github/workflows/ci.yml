name: CI
on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -e ".[mission]" pytest
      - run: pip install -r requirements-dev.txt fastapi httpx networkx scikit-learn
      - run: pytest tests/ -q --tb=short \
          --ignore=tests/test_api_security.py \
          --ignore=tests/test_interactive_explore.py \
          --ignore=tests/test_studio.py \
          --ignore=tests/test_i18n.py
