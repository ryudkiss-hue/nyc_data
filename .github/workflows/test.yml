name: Tests

on:
  push:
    branches: [main, fix/*, feat/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest matplotlib shapely openpyxl plotly flask

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify all modules import
        run: |
          python -c "
          import importlib
          modules = [
            'socrata_toolkit.client', 'socrata_toolkit.cli',
            'socrata_toolkit.analysis', 'socrata_toolkit.analysis_advanced',
            'socrata_toolkit.construction_list', 'socrata_toolkit.contract_analytics',
            'socrata_toolkit.borough_analysis', 'socrata_toolkit.program_metrics',
            'socrata_toolkit.reporting', 'socrata_toolkit.governance',
            'socrata_toolkit.visualization', 'socrata_toolkit.task_board',
            'socrata_toolkit.workflow_engine', 'socrata_toolkit.insights_engine',
            'socrata_toolkit.nlp_integration', 'socrata_toolkit.cost_estimator',
            'socrata_toolkit.change_detection', 'socrata_toolkit.budget_forecast',
            'socrata_toolkit.messaging', 'socrata_toolkit.sla_tracking',
            'socrata_toolkit.notification_rules', 'socrata_toolkit.data_dictionary',
          ]
          for mod in modules:
              importlib.import_module(mod)
          print(f'All {len(modules)} modules import OK')
          "
