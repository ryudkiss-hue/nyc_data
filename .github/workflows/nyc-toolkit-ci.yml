# Primary CI for NYC DOT Sidewalk Toolkit (Streamlit Mission Control + analyst CLI).

name: NYC Toolkit CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[xlsx,postgres,mission]"
          pip install -r requirements-dev.txt
          pip install networkx scikit-learn fastapi httpx

      - name: Ruff
        run: ruff check src/socrata_toolkit tests app

      - name: Run tests (core)
        run: |
          python -m pytest tests/ -q --tb=short -m "not legacy" \
            --cov=app --cov=src/socrata_toolkit/analyst --cov=src/socrata_toolkit/core \
            --cov-report=term-missing

      - name: Import smoke (analyst + shims)
        run: |
          python -c "
          import importlib
          mods = [
              'socrata_toolkit.core.cli',
              'socrata_toolkit.analyst.workflow',
              'socrata_toolkit.analysis.advanced',
              'socrata_toolkit.analysis.program',
              'socrata_toolkit.nlp.advanced',
          ]
          for m in mods:
              importlib.import_module(m)
          print('import smoke ok')
          "

      - name: Streamlit app import
        env:
          MISSION_DEMO: "1"
        run: python -c "from app import analytics, data_loader; print('streamlit app ok', data_loader.demo_mode_enabled())"

  test-legacy-dash:
    name: Legacy Dash imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[xlsx]"
          pip install -r requirements-dev.txt
          pip install dash dash-bootstrap-components plotly dash-ag-grid dask
      - name: Dash page imports
        run: python -m pytest tests/test_dash_pages_import.py -q --tb=short

  readiness:
    name: Readiness report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install toolkit
        run: |
          python -m pip install -U pip
          pip install -e ".[xlsx,mission]"
      - name: socrata readiness
        run: python -m socrata_toolkit.core.cli readiness

  docker-mission:
    name: Docker (Mission Control)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build mission image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mission
          push: false
          tags: nyc-dot-mission-control:ci
