# Primary CI for NYC DOT Sidewalk Toolkit (analyst + Dash).
# Replaces overlapping legacy workflows that produced 19 duplicate checks on each push.

name: NYC Toolkit CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[xlsx,postgres]"
          pip install -r requirements-dev.txt
          pip install dash dash-bootstrap-components plotly

      - name: Ruff
        run: ruff check socrata_toolkit tests dash_app

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Import smoke (analyst + shims)
        run: |
          python -c "
          import importlib
          mods = [
              'socrata_toolkit.core.cli',
              'socrata_toolkit.analyst.workflow',
              'socrata_toolkit.analysis.advanced',
              'socrata_toolkit.analysis.program',
              'socrata_toolkit.nlp.advanced',
          ]
          for m in mods:
              importlib.import_module(m)
          print('import smoke ok')
          "

  readiness:
    name: Readiness report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install toolkit
        run: |
          python -m pip install -U pip
          pip install -e ".[xlsx]"
      - name: socrata readiness
        run: python -m socrata_toolkit.core.cli readiness

  docker-analyst:
    name: Docker (analyst image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build analyst image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.analyst
          push: false
          tags: nyc-dot-toolkit-analyst:ci
