version: '3.9'

services:
  # PostgreSQL with PostGIS for spatial queries
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: dot_user
      POSTGRES_PASSWORD: dot_pass
      POSTGRES_DB: sidewalk_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dot_user -d sidewalk_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MongoDB for document storage
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Streamlit Dashboard
  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      PG_DSN: postgresql://dot_user:dot_pass@postgres:5432/sidewalk_db
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./socrata_toolkit:/app/socrata_toolkit

  # Flask REST API
  api:
    build: .
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "socrata_toolkit.api:create_app()"]
    ports:
      - "5000:5000"
    environment:
      PG_DSN: postgresql://dot_user:dot_pass@postgres:5432/sidewalk_db
      MONGO_URI: mongodb://mongo:27017
      FLASK_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs

volumes:
  pgdata:
  mongodata:
