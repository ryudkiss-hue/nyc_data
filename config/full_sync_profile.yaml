# NYC DOT Sidewalk Toolkit — analyst profile (example)
# Copy to config/analyst_profile.yaml (the wizard does this for you).
# Run: socrata analyst run --profile config/analyst_profile.yaml

# A short label for this profile (shown in logs and manifests).
profile_name: sidewalk_program_analyst

# Local database for review decisions and cached tables.
duckdb_path: nyc_mission_control.duckdb

# true = skip live Socrata downloads; use Excel/Postgres paths only.
offline: false

# Optional: file listing allowed budget codes (warns if spend codes are missing).
# budget_codes: config/budget_codes.yaml

# Folder of inquiry reply templates (Markdown).
inquiry_templates_dir: config/inquiry_templates

# Where the weekly Analyst Pack is written.
outputs:
  dir: outputs/analyst_pack
  formats:
    - xlsx
    - md
    - html
    - json

# Leave empty to include all contracts, or list IDs to filter.
contract_ids: []

# Data sources — each key becomes a table in the pack.
sources:
  # Live 311 complaints (needs SOCRATA_APP_TOKEN in .env unless offline: true)
  inspections:
    type: socrata
    domain: data.cityofnewyork.us
    fourfour: erm2-nwe9
    max_rows: 2000

  # Example Excel sources (uncomment and set your paths):
  # inspections:
  #   type: excel
  #   path: "Z:/Sidewalk/Inspections/*.xlsx"
  #   sheet: 0

  contracts:
    type: excel
    path: tests/fixtures/analyst/contracts.xlsx
    sheet: 0

  permits:
    type: excel
    path: tests/fixtures/analyst/permits.xlsx
    sheet: 0

# Pipeline steps toggles (true = run this step).
steps:
  prioritize: true
  construction_diff: true
  contract_report: true
  program_metric: true
  inquiry_templates: true
  executive_summary: true
  conflicts:
    buffer_m: 20
