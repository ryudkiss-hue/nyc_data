# NYC DOT Socrata Toolkit — Publish profile (example)
#
# Used by:
#   socrata analyst publish --profile config/publish_profile.yaml --pack outputs/analyst_pack/2026-05-20
#
# Tip: copy this to config/publish_profile.yaml and customize. Keep secrets out of git:
# - Prefer env vars for SMTP credentials and webhooks.

profile_name: default_publish

# Destination 1: copy the entire pack folder to a shared drive.
file_copy:
  enabled: true
  # The pack will be copied into: <dest_root>/<pack_name>/...
  dest_root: "Z:/Sidewalk/AnalystPacks"

# Destination 2: export BI-friendly files into a staging folder (CSV/JSON).
bi_export:
  enabled: true
  dest_root: "Z:/Sidewalk/BI/Staging/analyst_pack"
  # Optional: subset of artifacts. If omitted, exports all supported artifacts found.
  include:
    - construction_list.xlsx
    - program_kpi.json
    - contract_analytics.json
    - executive_summary.md

# Destination 3: send email summary + attachments (SMTP).
email:
  enabled: false
  smtp:
    host: "smtp.office365.com"
    port: 587
    starttls: true
    username_env: "TOOLKIT_SMTP_USERNAME"
    password_env: "TOOLKIT_SMTP_PASSWORD"
  from_env: "TOOLKIT_SMTP_FROM"
  to:
    - "manager@example.org"
  subject: "NYC DOT Analyst Pack — {pack_name}"
  # The first available of these will be used as the email body (fallback to manifest summary).
  body_prefer:
    - executive_summary.md
    - executive_summary.html
  attach:
    - executive_summary.html
    - construction_list.xlsx
    - conflicts_review.xlsx

# Destination 4: Teams channel notification (Incoming Webhook).
teams:
  enabled: false
  webhook_env: "TOOLKIT_TEAMS_WEBHOOK"
  title: "NYC DOT Analyst Pack published"
  # Optional: extra text appended after the exec summary snippet.
  footer: "Generated by NYC DOT Socrata Toolkit"

# Destination 5: PowerPoint export (optional extra: pip install '.[pptx]').
pptx:
  enabled: false
  template_path: "config/templates/executive_template.pptx"
  output_path: "outputs/published/{pack_name}.pptx"
  # Simple placeholder map: replace exact tokens in text boxes.
  # Example: "{{EXEC_SUMMARY}}" will be replaced with the executive summary markdown/plaintext.
  placeholders:
    "{{PACK_NAME}}": "{pack_name}"
    "{{RUN_DATE}}": "{run_date}"
    "{{PROFILE_NAME}}": "{profile_name}"
    "{{EXEC_SUMMARY}}": "{executive_summary_text}"

