# Google Cloud Build configuration for Cloud Run deployment
# Automatically builds and deploys on git push

steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/nyc-sidewalk-toolkit:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/nyc-sidewalk-toolkit:latest"
      - "-f"
      - "Dockerfile.cloudbuild"
      - "."

  # Step 2: Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/nyc-sidewalk-toolkit:$SHORT_SHA"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/run"
    args:
      - "deploy"
      - "nyc-sidewalk-toolkit"
      - "--image"
      - "gcr.io/$PROJECT_ID/nyc-sidewalk-toolkit:$SHORT_SHA"
      - "--region"
      - "northamerica-northeast2"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "SOCRATA_APP_TOKEN=${SOCRATA_APP_TOKEN},ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY},MOTHERDUCK_TOKEN=${MOTHERDUCK_TOKEN}"
      - "--memory"
      - "2Gi"
      - "--timeout"
      - "600"

images:
  - "gcr.io/$PROJECT_ID/nyc-sidewalk-toolkit:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/nyc-sidewalk-toolkit:latest"

options:
  machineType: "N1_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
  substitution_option: "ALLOW_LOOSE"

substitutions:
  _REGION: "northamerica-northeast2"
  _SERVICE_NAME: "nyc-sidewalk-toolkit"
