# Render Blueprint — one-click deploy for Mission Control
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nyc-mission-control
    runtime: python
    plan: free
    buildCommand: pip install -e ".[mission,postgres,xlsx]"
    startCommand: PYTHONPATH=src:. python -m streamlit run app/mission_control.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONPATH
        value: "src:."
      - key: MISSION_DEMO
        value: "1"
      # NYC Open Data — set your token in the Render dashboard for higher rate limits
      - key: SOCRATA_APP_TOKEN
        sync: false
      # LLM backends — set whichever you use in the Render dashboard (none required for demo mode)
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Ollama is self-hosted; point OLLAMA_HOST at your instance URL if using it
      - key: OLLAMA_HOST
        value: "http://localhost:11434"
