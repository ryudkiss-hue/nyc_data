version: '3.9'

# Development and testing compose -- lighter services, test runner included
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_db
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 3s
      timeout: 2s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27028:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 2s
      retries: 5

  tests:
    build: .
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    environment:
      PG_DSN: postgresql://test_user:test_pass@postgres:5432/test_db
      MONGO_URI: mongodb://mongo:27017
      RUN_INTEGRATION: "1"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
