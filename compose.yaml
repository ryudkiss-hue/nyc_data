# Canonical Docker Compose for NYC DOT SIM Toolkit
# Local development: Uses DuckDB (no external database required)
# Cloud deployment: Uses multi-stage Dockerfile build targets

services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
      target: mission
    container_name: nyc-dot-sim-toolkit
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      MISSION_DEMO: "${MISSION_DEMO:-0}"
      SOCRATA_CACHE_DIR: "/app/data/cache"
      DUCKDB_PATH: "/app/data/local_db/nyc_mission_control.duckdb"
    volumes:
      - ./data/cache:/app/data/cache
      - ./data/local_db:/app/data/local_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  analyst-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: analyst
    container_name: nyc-dot-analyst-cli
    profiles: ["batch"]
    env_file:
      - path: .env
        required: false
    environment:
      ANALYST_PROFILE: "config/analyst_profile.example.yaml"
      SOCRATA_CACHE_DIR: "/app/data/cache"
      DUCKDB_PATH: "/app/data/local_db/nyc_mission_control.duckdb"
    volumes:
      - ./data/cache:/app/data/cache
      - ./data/local_db:/app/data/local_db
      - ./outputs:/app/outputs

volumes: {}
