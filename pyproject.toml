[tool.poetry]
name = "socrata_toolkit"
version = "0.3.0"
description = "NYC DOT Sidewalk Inspection & Management Toolkit"
authors = ["Richard Yudkiss ryudkiss@gmail.com"]
readme = "README.md"
license = "MIT"

[tool.poetry.dependencies]
python = ">=3.9,<3.13"
python-dotenv = ">=1.0.0"

requests = ">=2.28"
pandas = ">=2.0,<3.0"
pyyaml = ">=6.0"
click = ">=8.0"
numpy = ">=1.24,<3.0"
duckdb = ">=0.9.0"
tenacity = ">=8.0"
apscheduler = ">=3.10"
pyinstaller = ">=6.0"

# LangChain and LLM integrations
langchain = ">=0.1.0"
langchain-community = ">=0.0.10"
langchain-openai = ">=0.1.0"
duckdb-engine = ">=0.9.0"
ollama = ">=0.1.0"
openai = ">=1.0.0"
huggingface-hub = ">=0.16.0"
pydantic = ">=2.0"

# Optional heavy dependencies
streamlit = {version = ">=1.10", optional = true}
spacy = {version = ">=3.5", optional = true}
shapely = {version = "^2.0", optional = true}
matplotlib = {version = ">=3.5", optional = true}
openpyxl = {version = ">=3.0", optional = true}

[tool.poetry.extras]
xlsx = ["openpyxl"]
nlp = ["spacy"]
viz = ["matplotlib"]
geo = ["shapely"]
ui = ["streamlit"]
all = ["duckdb", "tenacity", "apscheduler", "openpyxl", "spacy", "shapely", "matplotlib", "streamlit"]

[tool.poetry.scripts]
socrata = "socrata_toolkit.cli:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=7.0)",
    "black (>=23.0)",
    "ruff (>=0.1.0)",
    "isort (>=5.0)",
    "coverage (>=7.0)",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Select rules to enable: Pyflakes (F), pycodestyle (E, W), isort (I), pyupgrade (UP), flake8-bugbear (B)
select = ["E", "F", "W", "I", "UP", "B"]
# Ignore rules that conflict with Black formatting (like line length enforcing)
ignore = ["E501"]
# Customize exactly which rules Ruff should automatically fix
# E.g., fix imports (I), pyupgrade (UP), and specific Pyflakes rules like unused imports (F401)
fixable = ["I", "UP", "F401"]
# Ensure certain risky rules are NEVER auto-fixed (like unused variables F841 or Bugbear B)
unfixable = ["F841", "B"]
