[build-system]
requires = ["setuptools>=61.0", "wheel", "setuptools_scm"]
build-backend = "setuptools.build_meta"

[project]
name = "socrata_toolkit"
version = "0.2.0"
description = "Socrata toolkit for NYC data"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Your Name", email = "you@example.com" }]
keywords = ["socrata", "nyc", "data"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]

dependencies = [
  "requests>=2.28",
  "pandas>=1.5",
  "pyyaml>=6.0",
  "typer>=0.7",
  "click>=8.0",
  "streamlit>=1.10",
  "pytest>=7.0",
  "weasel<0.4.0"
  "spacey>=3.14"
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=2.9"]
mongo = ["pymongo>=4.0"]
xlsx = ["openpyxl>=3.0"]
nlp = ["spacy>=3.5"]
dev = ["black", "ruff", "isort", "pre-commit", "pytest", "tox"]

[project.scripts]
socrata = "socrata_toolkit.cli:app"

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tests", "docs", "analysis", ".venv*"]
