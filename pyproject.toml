[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "socrata-toolkit"
version = "0.1.0"
description = "Batteries-included toolkit for the Socrata Open Data API"
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "Socrata Toolkit Contributors"}]
dependencies = [
  "requests>=2.31.0",
  "click>=8.1.7",
  "pandas>=2.0.0",
  "openpyxl>=3.1.2",
  "streamlit>=1.45.0",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1.18"]
mongo = ["pymongo>=4.6.0"]
all = ["psycopg[binary]>=3.1.18", "pymongo>=4.6.0"]
dev = ["pytest>=8.2.0", "pytest-cov>=5.0.0", "ruff>=0.6.0", "mypy>=1.11.0"]

[project.scripts]
socrata = "socrata_toolkit.cli:main"
socrata-setup = "socrata_toolkit.install_wizard:main"

[tool.setuptools.packages.find]
include = ["socrata_toolkit*"]


[tool.ruff]
line-length = 120

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
