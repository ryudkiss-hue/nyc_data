[tool.poetry]
name = "socrata_toolkit"
version = "0.2.0"
description = "Socrata toolkit for NYC data"
authors = ["Richard Yudkiss ryudkiss@gmail.com"]
readme = "README.md"
license = "MIT"

[tool.poetry.dependencies]
python = ">=3.10,<3.13"

requests = ">=2.28"
pandas = ">=2.0,<3.0"
pyyaml = ">=6.0"
typer = ">=0.7"
click = ">=8.0"
streamlit = ">=1.10"
pytest = ">=7.0"

numpy = "<2.0.0"

spacy = "3.7.2"
shapely = "^2.0"
weasel = "<0.4.0"
smart-open = "6.4.0"
pathy = "0.10.3"

psycopg-binary = { version = ">=2.9", optional = true }
pymongo = { version = ">=4.0", optional = true }
openpyxl = { version = ">=3.0", optional = true }

[tool.poetry.extras]
postgres = ["psycopg-binary"]
mongo = ["pymongo"]
xlsx = ["openpyxl"]
nlp = ["spacy"]
dev = ["black", "ruff", "isort", "pre-commit", "pytest", "tox"]

[tool.poetry.scripts]
socrata = "socrata_toolkit.cli:app"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.3,<10.0.0)"
]
