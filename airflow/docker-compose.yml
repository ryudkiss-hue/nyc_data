version: '3.8'

services:
  # ============================================================================
  # PostgreSQL: Airflow Metadata Database + Warehouse Database
  # ============================================================================
  postgres:
    image: postgres:14-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_nyc_domain_model.sql:/docker-entrypoint-initdb.d/01_domain_model.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - airflow

  # ============================================================================
  # Redis: Celery Broker & Result Backend (for production CeleryExecutor)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: airflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - airflow

  # ============================================================================
  # Airflow Scheduler: Parses DAGs and schedules task execution
  # ============================================================================
  scheduler:
    build:
      context: ..
      dockerfile: airflow/Dockerfile.scheduler
    container_name: airflow-scheduler
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__PARALLELISM: 4
      AIRFLOW__CORE__DAG_CONCURRENCY: 2
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 2
      AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: 5
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: 'True'
      AIRFLOW_HOME: /opt/airflow
      POSTGRES_WAREHOUSE_HOST: postgres
      POSTGRES_WAREHOUSE_PORT: 5432
      POSTGRES_WAREHOUSE_USER: airflow
      POSTGRES_WAREHOUSE_PASSWORD: airflow
      POSTGRES_WAREHOUSE_DB: nyc_sidewalk
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-demo_token}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
      - ./config:/opt/airflow/config
      - ..:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: scheduler
    networks:
      - airflow
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import airflow; print(airflow.__version__)'"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Airflow Webserver: Web UI for monitoring and management (port 8080)
  # ============================================================================
  webserver:
    build:
      context: ..
      dockerfile: airflow/Dockerfile.webserver
    container_name: airflow-webserver
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__PARALLELISM: 4
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'True'
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: 'True'
      AIRFLOW_HOME: /opt/airflow
      POSTGRES_WAREHOUSE_HOST: postgres
      POSTGRES_WAREHOUSE_PORT: 5432
      POSTGRES_WAREHOUSE_USER: airflow
      POSTGRES_WAREHOUSE_PASSWORD: airflow
      POSTGRES_WAREHOUSE_DB: nyc_sidewalk
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-demo_token}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
      - ./config:/opt/airflow/config
      - ..:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - airflow
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/pools || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Flower: Celery monitoring UI (optional, for CeleryExecutor in production)
  # ============================================================================
  flower:
    image: mher/flower:2.0
    container_name: airflow-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - airflow
    profiles:
      - dev  # Only run with --profile dev

networks:
  airflow:
    driver: bridge

volumes:
  postgres_data:
    driver: local

